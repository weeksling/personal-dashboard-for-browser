<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Background photo layer -->
  <div id="bg" class="background"></div>
  <div class="overlay"></div>

  <!-- Main content -->
  <main class="content">
    <!-- Top bar: toggle icons (invisible until hover) -->
    <header class="top-bar" id="top-bar">
      <div class="top-bar-left">
        <button class="icon-btn" id="refresh-photo" title="New photo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </button>
      </div>
      <div class="top-bar-right">
        <button class="icon-btn" id="toggle-time" title="Toggle time">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
        </button>
        <button class="icon-btn" id="toggle-todos" title="Toggle todos">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"></path>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Center: Greeting + Date + Time + One Thing -->
    <section id="time-section" class="center-content">
      <div class="center-inner">
        <div id="greeting-section" class="greeting-section"></div>
        <div id="date-display" class="date-display"></div>
        <div id="clock" class="clock"></div>
        <div id="one-thing-section" class="one-thing-section"></div>
      </div>
    </section>

    <!-- Bottom area -->
    <section class="bottom-content">
      <div id="todo-section" class="todo-section"></div>
    </section>
  </main>

  <!-- Photo credit -->
  <div id="photo-credit" class="photo-credit"></div>

  <script src="app.js"></script>
</body>
</html>
