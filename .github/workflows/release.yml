name: Release Extension

on:
  push:
    branches: [main]

jobs:
  release:
    # Don't run on version-bump commits to avoid infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Bump minor version in manifest.json
        id: bump
        run: |
          CURRENT=$(grep '"version"' manifest.json | sed 's/.*"\([0-9.]*\)".*/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="${MAJOR}.$((MINOR + 1)).0"
          sed -i "s/\"version\": \"$CURRENT\"/\"version\": \"$NEW\"/" manifest.json
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Build zip
        run: bash build.sh

      - name: Create GitHub release
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            "dashboard-v${{ steps.bump.outputs.version }}.zip" \
            --title "v${{ steps.bump.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Chrome Web Store
        continue-on-error: true
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          file-path: "dashboard-v${{ steps.bump.outputs.version }}.zip"
          publish: false
